<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Sign in</title>
</head>
<body class="bg-gray-950 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm">

    <!-- Logo + heading -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gray-900 border border-gray-800 mb-5">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-indigo-400" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75
               M6.75 10.5h10.5a2.25 2.25 0 0 1 2.25 2.25v6.75
               a2.25 2.25 0 0 1-2.25 2.25H6.75
               a2.25 2.25 0 0 1-2.25-2.25v-6.75
               a2.25 2.25 0 0 1 2.25-2.25z" />
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-gray-100 tracking-tight">Sign in</h1>
      <p class="text-sm text-gray-500 mt-1">Enter your credentials to continue</p>
    </div>

    <!-- Form card -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 space-y-5">

      <form method="POST" action="/login" class="space-y-4">

        <!-- Username -->
        <div class="space-y-1.5">
          <label for="username" class="block text-xs font-medium text-gray-400 uppercase tracking-wide">
            Username
          </label>
          <input
            id="username" name="username" type="text"
            required autocomplete="username" autofocus
            placeholder="admin"
            class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3.5 py-2.5
                   text-sm text-gray-100 placeholder-gray-700
                   focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500
                   transition duration-150"
          />
        </div>

        <!-- Password -->
        <div class="space-y-1.5">
          <label for="password" class="block text-xs font-medium text-gray-400 uppercase tracking-wide">
            Password
          </label>
          <input
            id="password" name="password" type="password"
            required autocomplete="current-password"
            placeholder="••••••••"
            class="w-full bg-gray-950 border border-gray-700 rounded-lg px-3.5 py-2.5
                   text-sm text-gray-100 placeholder-gray-700
                   focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500
                   transition duration-150"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
                 text-white text-sm font-medium py-2.5 rounded-lg
                 transition duration-150 focus:outline-none
                 focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 focus:ring-offset-gray-900"
        >
          Sign in
        </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs text-gray-700 mt-6">
      Protected by BFDetect &mdash; brute force detection active
    </p>

  </div>

</body>
</html>
